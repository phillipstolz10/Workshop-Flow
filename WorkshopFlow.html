<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WorkshopFlow — workshop planner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ── Design tokens & base ── */
:root {
  --bg: #fafaf9;
  --surface: #ffffff;
  --surface-2: #f5f5f4;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --text: #0c0a09;
  --text-muted: #78716c;
  --text-subtle: #a8a29e;
  --accent: #f97316;
  --accent-ink: #ffffff;
  --accent-soft: #fff7ed;
  --accent-border: #fed7aa;
  --danger: #dc2626;
  --font-sans: "Geist", "Inter Tight", ui-sans-serif, system-ui, sans-serif;
  --font-serif: "Instrument Serif", "Times New Roman", serif;
  --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --row-py: 16px;
  --row-px: 18px;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}

body[data-density="compact"]     { --row-py: 10px; --row-px: 14px; }
body[data-density="comfortable"] { --row-py: 16px; --row-px: 18px; }
body[data-density="spacious"]    { --row-py: 22px; --row-px: 22px; }

.serif  { font-family: var(--font-serif); letter-spacing: -0.01em; }
.mono   { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.h-display { font-family: var(--font-serif); font-weight: 400; line-height: 1.02; letter-spacing: -0.02em; }
.eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font: inherit;
  font-weight: 500;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
}
.btn:hover { background: var(--surface-2); }
.btn:active { transform: translateY(0.5px); }
.btn[disabled] { opacity: 0.4; cursor: not-allowed; }

.btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
.btn-primary:hover { background: #1f1b18; }

.btn-accent { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn-accent:hover { background: #ea580c; border-color: #ea580c; }

.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--surface-2); }

.btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; color: var(--text-muted); }
.btn-icon:hover { color: var(--text); }

.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  border: 1px solid var(--border); border-bottom-width: 2px;
  border-radius: 4px; background: var(--surface);
  font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); line-height: 1;
}

/* Inputs */
.input, .textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  padding: 9px 11px;
  font: inherit;
  font-size: 13.5px;
  color: var(--text);
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.input:focus, .textarea:focus {
  outline: none;
  border-color: var(--text);
  box-shadow: 0 0 0 3px rgba(12,10,9,0.08);
}
.textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

.field-label {
  display: block; font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 6px;
}

/* Scrollbar */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 8px; border: 2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

/* App chrome */
.app-shell { display: flex; flex-direction: column; min-height: 100vh; }
.topnav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(250,250,249,0.85);
  backdrop-filter: saturate(180%) blur(8px);
  -webkit-backdrop-filter: saturate(180%) blur(8px);
  position: sticky; top: 0; z-index: 30;
}
.topnav-left { display: flex; align-items: center; gap: 14px; }
.brand {
  display: inline-flex; align-items: baseline; gap: 1px;
  font-family: var(--font-serif); font-size: 22px;
  letter-spacing: -0.02em; color: var(--text); text-decoration: none;
}
.brand .dot { color: var(--accent); }
.crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
.crumbs a { color: var(--text-muted); text-decoration: none; cursor: pointer; }
.crumbs a:hover { color: var(--text); }
.crumbs .sep { color: var(--text-subtle); }
.crumbs .here { color: var(--text); }
.topnav-right { display: flex; align-items: center; gap: 8px; }

.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--text); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 14px;
}

.page { padding: 40px 28px 80px; max-width: 1240px; margin: 0 auto; width: 100%; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 32px; }
.page-title { font-family: var(--font-serif); font-size: 56px; line-height: 1.06; letter-spacing: -0.025em; margin: 0; font-weight: 400; text-wrap: balance; }
.page-sub { color: var(--text-muted); margin-top: 10px; font-size: 14px; max-width: 56ch; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}
.card.hoverable { cursor: pointer; }
.card.hoverable:hover {
  border-color: var(--border-strong);
  box-shadow: 0 1px 0 rgba(12,10,9,0.02), 0 8px 24px -16px rgba(12,10,9,0.18);
  transform: translateY(-1px);
}

.divider { height: 1px; background: var(--border); border: 0; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  border-radius: var(--r-md);
  padding: 10px 14px;
  font-size: 13px;
  display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 12px 32px -12px rgba(0,0,0,0.4);
  z-index: 60;
  animation: toastIn 200ms ease;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px; border-radius: 999px;
  background: var(--surface-2); font-size: 11.5px; color: var(--text-muted);
  border: 1px solid var(--border); font-family: var(--font-mono); font-feature-settings: "tnum";
}
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }

/* ── Dashboard ── */
.dash-list {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
}
.dash-list-clean {}

.dash-row {
  display: grid;
  grid-template-columns: 1fr 40px;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 100ms ease;
}
.dash-row-clean { grid-template-columns: 1fr 40px; }
.dash-row:last-of-type { border-bottom: 0; }
.dash-row:hover { background: var(--surface-2); }
.dash-row:hover .dash-row-arrow { transform: translateX(2px); color: var(--text); }
.dash-row-main { min-width: 0; }
.dash-row-title {
  font-family: var(--font-serif); font-size: 22px; letter-spacing: -0.01em;
  margin-bottom: 2px;
  display: flex; align-items: center;
}
.dash-row-desc { color: var(--text-muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dash-row-arrow { color: var(--text-subtle); display: inline-flex; transition: transform 140ms ease, color 140ms ease; }
.dash-row-deletable { position: relative; }
.dash-row-delete {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  opacity: 0; transition: opacity 120ms ease, color 120ms ease, background 120ms ease;
}
.dash-row-deletable:hover .dash-row-delete { opacity: 1; }
.dash-row-delete:hover { color: var(--danger) !important; background: #fef2f2 !important; }

.dash-row-new {
  display: grid;
  grid-template-columns: 1fr 40px;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  background: transparent; border: 0; border-top: 1px dashed var(--border);
  text-align: left; cursor: pointer; font: inherit; width: 100%;
}
.dash-row-new .dash-row-title { font-family: var(--font-sans); font-size: 14px; font-weight: 500; margin-bottom: 0; }
.dash-row-new:hover { background: var(--surface-2); }

/* ── Project view ── */
.ws-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.ws-card {
  position: relative; padding: 22px 24px;
  display: grid; grid-template-columns: 64px 1fr 24px; gap: 20px; align-items: flex-start;
}
.ws-card-num { font-size: 48px; line-height: 1; color: var(--text-subtle); letter-spacing: -0.02em; }
.ws-card-body { min-width: 0; }
.ws-card-date { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-family: var(--font-mono); font-weight: 500; }
.ws-card-title { font-family: var(--font-serif); font-size: 26px; line-height: 1.1; letter-spacing: -0.015em; margin-bottom: 12px; }
.ws-card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.ws-card-arrow { color: var(--text-subtle); transition: transform 160ms ease, color 160ms ease; align-self: center; }
.ws-card.hoverable:hover .ws-card-arrow { transform: translateX(3px); color: var(--text); }
.ws-card.hoverable:hover .ws-card-num { color: var(--accent); }
.ws-card-new {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  border: 1px dashed var(--border-strong); border-radius: var(--r-lg);
  background: transparent; cursor: pointer; font: inherit; color: var(--text-muted);
  min-height: 156px;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
}
.ws-card-new:hover { background: var(--surface); color: var(--text); border-color: var(--text); }
.ws-card-new span:nth-of-type(1) { font-family: var(--font-serif); font-size: 20px; }
.ws-card-new-hint { font-size: 12px; color: var(--text-subtle); }
.ws-card-deletable { position: relative; }
.ws-card-delete {
  position: absolute; top: 12px; right: 12px;
  opacity: 0; transition: opacity 120ms ease, color 120ms ease, background 120ms ease;
}
.ws-card-deletable:hover .ws-card-delete { opacity: 1; }
.ws-card-delete:hover { color: var(--danger) !important; background: #fef2f2 !important; }

/* ── Workshop planner ── */
.ws-page { padding-bottom: 120px; }

.ws-header { border-bottom: 1px solid var(--border); background: var(--surface); }
.ws-header-inner {
  max-width: 1240px; margin: 0 auto; padding: 32px 28px 24px;
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: flex-end;
}
.ws-header-meta { min-width: 0; }
.ws-title {
  display: block; font-family: var(--font-serif); font-size: 52px; line-height: 1;
  letter-spacing: -0.025em; font-weight: 400; outline: none; border-radius: 4px;
  padding: 2px 4px; margin-left: -4px;
}
.ws-title:hover { background: var(--surface-2); }
.ws-title:focus { background: var(--surface-2); box-shadow: 0 0 0 2px var(--accent-border); }

.ws-header-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; color: var(--text-muted); font-size: 13px; }
.ws-date {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 4px 8px; margin-left: -8px; border-radius: 6px;
  font-family: var(--font-mono); font-size: 13px; color: var(--text);
}
.ws-date:hover { background: var(--surface-2); }
.ws-date-input {
  border: 0; background: transparent; padding: 0; margin: 0; font: inherit; color: inherit;
  outline: none; font-family: var(--font-mono); font-feature-settings: "tnum";
}

.ws-start-time {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 4px 8px; border-radius: 6px;
  font-family: var(--font-mono); font-size: 13px; color: var(--accent);
}
.ws-start-time:hover { background: var(--surface-2); }
.ws-start-time-input {
  border: 0; background: transparent; padding: 0; margin: 0; font: inherit; color: inherit;
  outline: none; font-family: var(--font-mono); font-feature-settings: "tnum"; width: 48px;
}
.ws-end-time { color: var(--text-muted); font-family: var(--font-mono); font-size: 13px; }
.blk-start-time { font-size: 10px; color: var(--text-subtle); font-family: var(--font-mono); line-height: 1.2; text-align: right; margin-top: 1px; }

.ws-header-total {
  text-align: right; padding: 14px 18px; border-left: 1px solid var(--border);
  padding-left: 28px; min-width: 200px; white-space: nowrap;
}
.ws-header-total .eyebrow { white-space: nowrap; }
.ws-total-num {
  font-size: 64px; line-height: 1; letter-spacing: -0.025em; font-weight: 400;
  font-family: var(--font-serif); color: var(--text);
  display: inline-flex; align-items: baseline; gap: 6px;
  font-feature-settings: "tnum"; white-space: nowrap;
}
.ws-total-unit { font-size: 18px; color: var(--text-muted); font-family: var(--font-sans); font-weight: 500; white-space: nowrap; }
.ws-total-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; }
.ticker { display: inline-block; transition: transform 280ms cubic-bezier(.2,.9,.3,1.3), color 200ms ease; }
.ticker.is-bump { transform: translateY(-2px) scale(1.04); color: var(--accent); }
.ticker.is-over { color: var(--accent); }

/* Toolbar */
.ws-toolbar {
  max-width: 1240px; margin: 0 auto; padding: 6px 24px 14px;
  display: flex; align-items: center; gap: 6px;
}
.ws-toolbar-group { display: flex; align-items: center; gap: 2px; }
.ws-toolbar-divider { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }
.ws-tool { height: 32px; padding: 0 10px; font-size: 12.5px; gap: 6px; }
.ws-tool .kbd { margin-left: 4px; }

/* Agenda */
.ws-agenda {
  max-width: 1240px; margin: 0 auto; padding: 28px 28px 0;
  display: flex; flex-direction: column; gap: 18px;
}
.ws-agenda.style-flat { gap: 0; }
.ws-agenda.style-flat .sec { padding-top: 12px; }
.ws-agenda.style-flat .sec + .sec { border-top: 1px solid var(--border); margin-top: 18px; padding-top: 28px; }

/* Section */
.sec {}
.sec-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.sec-flat { background: transparent; border: 0; }

.sec-head {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.sec-flat .sec-head { padding: 0 4px 12px; border-bottom: 0; }

.sec-toggle {
  width: 24px; height: 24px; border: 0; background: transparent;
  border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-muted);
}
.sec-toggle:hover { background: var(--surface-2); color: var(--text); }

.sec-index { font-size: 11px; color: var(--text-subtle); letter-spacing: 0.04em; }
.sec-title {
  font-family: var(--font-serif); font-size: 24px; letter-spacing: -0.015em; line-height: 1.1;
  flex: 1; outline: none; border-radius: 4px; padding: 2px 6px; margin-left: -6px; min-width: 0;
}
.sec-title:hover { background: var(--surface-2); }
.sec-title:focus { background: var(--surface-2); box-shadow: 0 0 0 2px var(--accent-border); }
.sec-flat .sec-title:hover { background: var(--bg); }

.sec-meta { display: flex; gap: 6px; }
.sec-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 120ms ease; }
.sec:hover .sec-actions { opacity: 1; }

.sec-duration {
  display: inline-flex; align-items: baseline; gap: 4px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--accent);
  font-feature-settings: "tnum";
}
.sec-duration-num { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.sec-duration-unit { font-size: 11px; color: var(--accent); opacity: 0.7; }

/* Insert section between */
.sec-insert {
  display: flex; align-items: center; gap: 10px; padding: 0 4px;
  height: 18px; margin: -4px 0; cursor: pointer; opacity: 0;
  transition: opacity 140ms ease, height 160ms ease, margin 160ms ease;
}
.ws-agenda:hover .sec-insert { opacity: 0.6; }
.sec-insert:hover { opacity: 1 !important; height: 32px; margin: 0; }
.sec-insert-line { flex: 1; height: 1px; background: var(--border-strong); }
.sec-insert:hover .sec-insert-line { background: var(--accent); }
.sec-insert-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 500; color: var(--text-muted);
  background: var(--bg); padding: 2px 10px;
  border-radius: 999px; border: 1px solid var(--border-strong); white-space: nowrap;
}
.sec-insert:hover .sec-insert-btn { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

.sec-body { padding: 8px; }
.sec-flat .sec-body { padding: 0; }

.sec-empty {
  width: 100%; border: 1px dashed var(--border-strong); border-radius: var(--r-md);
  background: transparent; padding: 24px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font: inherit; font-size: 13px; color: var(--text-muted); cursor: pointer;
}
.sec-empty:hover { background: var(--surface-2); color: var(--text); border-color: var(--text); }

/* Block */
.blk { border-radius: var(--r-md); position: relative; transition: background 120ms ease; }
.sec-card .blk + .blk { border-top: 1px solid var(--border); border-radius: 0; }
.sec-card .blk:first-child { border-top-left-radius: 0; border-top-right-radius: 0; }
.sec-flat .blk + .blk { border-top: 1px solid var(--border); }

.blk-row {
  display: grid; grid-template-columns: 24px 1fr auto;
  align-items: flex-start; gap: 16px; padding: var(--row-py) var(--row-px); cursor: pointer;
}
.blk-title-head { display: flex; align-items: flex-start; gap: 14px; }
.blk-content-col { display: flex; flex-direction: column; min-width: 0; }
.blk:hover { background: var(--surface-2); }
.sec-flat .blk:hover { background: var(--surface); }
.blk.is-editing { background: var(--accent-soft); }

.blk-grip {
  width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-subtle); opacity: 0; cursor: grab; border-radius: 4px;
  transition: opacity 120ms ease, background 120ms ease; margin-top: 2px;
}
.blk:hover .blk-grip { opacity: 1; }
.blk-grip:hover { background: var(--surface-2); color: var(--text); }
.blk-grip:active { cursor: grabbing; }
.blk.is-dragging { opacity: 0.4; }
.blk.is-editing .blk-grip { opacity: 1; }
.blk.is-drop-target { box-shadow: 0 -2px 0 var(--accent) inset; }
.blk.is-drop-target::before {
  content: ""; position: absolute; left: 8px; right: 8px; top: -1px;
  height: 2px; background: var(--accent); border-radius: 2px;
}

.blk-drop-tail {
  height: 14px; border: 1px dashed transparent; border-radius: var(--r-md);
  margin: 2px 6px; transition: all 120ms ease;
}
.blk-drop-tail.is-active { height: 36px; border-color: var(--accent); background: var(--accent-soft); }

.sec-empty.is-drop-target { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }

.blk-duration {
  position: relative; font-family: var(--font-mono); font-size: 18px; font-weight: 500;
  color: var(--text); text-align: right; font-feature-settings: "tnum";
  padding: 2px 6px; letter-spacing: -0.02em; border-radius: 6px; cursor: pointer;
  border: 1px solid transparent; transition: background 100ms ease, border-color 100ms ease;
  margin-left: -6px;
}
.blk:hover .blk-duration { background: var(--surface); border-color: var(--border); }
.blk-duration.is-open { background: var(--surface); border-color: var(--text); }
.blk-duration-unit { font-size: 11px; color: var(--text-subtle); margin-left: 1px; }

/* Inline duration popover */
.blk-dur-pop {
  position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-md);
  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.18);

.blk-dur-step {

.blk-main { min-width: 0; }

.blk-title { font-size: 15px; font-weight: 500; letter-spacing: -0.005em; line-height: 1.35; margin-bottom: 3px; color: var(--text); }

.blk-desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.5; margin-top: 6px; max-width: 78ch; }

body[data-density="compact"] .blk-desc { display: none; }

/* Section drag */
.sec { position: relative; }
.sec-grip {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 36px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-subtle); cursor: grab;
  border-radius: 0 0 6px 6px;
  background: var(--surface-2); border: 1px solid var(--border); border-top: 0;
  opacity: 0; z-index: 2;
  transition: opacity 120ms ease, background 120ms ease, color 120ms ease;
}
.sec:hover .sec-grip { opacity: 1; }

.sec-grip:active { cursor: grabbing; }

.blk-actions { display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity 120ms ease; }
.blk:hover .blk-actions { opacity: 1; }
.blk.is-editing .blk-actions { opacity: 0.5; }
.blk-delete:hover { color: var(--danger); background: #fef2f2; }

.sec-add-row {
  width: calc(100% - 4px); margin: 2px; border: 0; background: transparent;
  display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: var(--r-md);
  font: inherit; font-size: 12.5px; color: var(--text-subtle); cursor: pointer; text-align: left;

.ws-add-section {

  border-radius: var(--r-lg); padding: 18px; font: inherit; font-size: 14px; color: var(--text-muted);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 10px;

.ws-add-section:hover { background: var(--surface); color: var(--text); border-color: var(--text); }

/* Block editor — inline */
.be-inline {
  padding: 6px 18px 20px; margin: 0 6px;
  border-top: 1px dashed var(--accent-border); animation: beIn 160ms ease;
}
@keyframes beIn { from { opacity: 0; transform: translateY(-4px);} to { opacity: 1; transform: translateY(0);} }

.be-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 18px; margin-top: 14px; }
.be-field {}
.be-field-title    { grid-column: 1; grid-row: 1; }
.be-field-duration { grid-column: 2; grid-row: 1; }
.be-field-desc     { grid-column: 1 / -1; grid-row: 2; }
.be-field-person   { grid-column: 1; grid-row: 3; }
.be-field-material { grid-column: 2; grid-row: 3; }

.be-duration-stepper { display: grid; grid-template-columns: 36px 1fr auto 36px; align-items: center; gap: 6px; }
.be-step {
  height: 36px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--r-md);

/* Block editor — slide-in panel */

// Convert Supabase rows → flat app data format
window.dbToAppData = function (projects, workshops, sections, blocks) {
  const wssByProj = {}, sectsByWs = {}, blocksBySect = {};
  for (const w of workshops || []) (wssByProj[w.project_id] = wssByProj[w.project_id] || []).push(w);
  for (const s of sections  || []) (sectsByWs[s.workshop_id]  = sectsByWs[s.workshop_id]  || []).push(s);
  for (const b of blocks    || []) (blocksBySect[b.section_id] = blocksBySect[b.section_id] || []).push(b);
  return {
    projects: (projects || []).map(p => ({
      id: p.id, name: p.name, description: p.description || '',
      workshopIds: (wssByProj[p.id] || []).sort((a,b) => a.position - b.position).map(w => w.id)
    })),
    workshops: Object.fromEntries((workshops || []).map(w => [w.id, {
      id: w.id, projectId: w.project_id, title: w.title, date: w.date || '',
      plannedDuration: w.planned_duration || 0, startTime: w.start_time || '09:00',
      sectionIds: (sectsByWs[w.id] || []).sort((a,b) => a.position - b.position).map(s => s.id)
    }])),
    sections: Object.fromEntries((sections || []).map(s => [s.id, {
      id: s.id, workshopId: s.workshop_id, title: s.title,
      blockIds: (blocksBySect[s.id] || []).sort((a,b) => a.position - b.position).map(b => b.id)
    }])),
    blocks: Object.fromEntries((blocks || []).map(b => [b.id, {
      id: b.id, sectionId: b.section_id, title: b.title, duration: b.duration,
      description: b.description || '', person: b.person || '', material: b.material || ''
    }]))
  };
};

// Load everything from Supabase
window.loadAllData = async function () {
  const [pr, wr, sr, br] = await Promise.all([
    window.db.from('projects').select('*').order('created_at'),
    window.db.from('workshops').select('*').order('position'),
    window.db.from('sections').select('*').order('position'),
    window.db.from('blocks').select('*').order('position'),
  ]);
  if (pr.error) throw pr.error;
  return window.dbToAppData(pr.data, wr.data, sr.data, br.data);
};

};

// Re-sync block positions within a section after reorder/add/move
window.syncBlockPositions = async function (sectionId, blockIds) {
  for (let i = 0; i < blockIds.length; i++) {
    await window.db.from('blocks').update({ position: i, section_id: sectionId }).eq('id', blockIds[i]);
  }
};

// Full state diff sync used by undo/redo
window.applyStateDiff = async function (fromState, toState) {
  // Projects
  const fromPIds = new Set(fromState.projects.map(p => p.id));
  const toPIds   = new Set(toState.projects.map(p => p.id));
  const delProjs = [...fromPIds].filter(id => !toPIds.has(id));
  if (delProjs.length) await window.db.from('projects').delete().in('id', delProjs);
  if (toState.projects.length) {
    await window.db.from('projects').upsert(toState.projects.map(p => ({ id: p.id, name: p.name, description: p.description || '' })));
  }

  // Workshops
  const fromWIds = new Set(Object.keys(fromState.workshops));
  const toWIds   = new Set(Object.keys(toState.workshops));
  const delWs    = [...fromWIds].filter(id => !toWIds.has(id));
  if (delWs.length) await window.db.from('workshops').delete().in('id', delWs);
  const wsRows = toState.projects.flatMap(p => p.workshopIds.map((wid, i) => {
    const w = toState.workshops[wid];
    return { id: w.id, project_id: w.projectId, title: w.title, date: w.date || null, planned_duration: w.plannedDuration || 0, start_time: w.startTime || '09:00', position: i };
  }));
  if (wsRows.length) await window.db.from('workshops').upsert(wsRows);

  // Sections
  const fromSIds = new Set(Object.keys(fromState.sections));
  const toSIds   = new Set(Object.keys(toState.sections));
  const delSects = [...fromSIds].filter(id => !toSIds.has(id));
  if (delSects.length) await window.db.from('sections').delete().in('id', delSects);
  const secRows = Object.values(toState.workshops).flatMap(w =>
    w.sectionIds.map((sid, i) => ({ id: sid, workshop_id: w.id, title: toState.sections[sid]?.title || '', position: i }))
  );
  if (secRows.length) await window.db.from('sections').upsert(secRows);

  // Blocks
  const fromBIds = new Set(Object.keys(fromState.blocks));
  const toBIds   = new Set(Object.keys(toState.blocks));
  const delBlocks = [...fromBIds].filter(id => !toBIds.has(id));
  if (delBlocks.length) await window.db.from('blocks').delete().in('id', delBlocks);
  const blkRows = Object.values(toState.sections).flatMap(s =>
    s.blockIds.map((bid, i) => {
      const b = toState.blocks[bid];
      return { id: b.id, section_id: s.id, position: i, duration: b.duration, title: b.title,
        description: b.description || null, person: b.person || null, material: b.material || null };
    })
  );
  if (blkRows.length) await window.db.from('blocks').upsert(blkRows);
};

<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;

  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}

  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default;width:100%}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {
  return (<><div className="twk-sect">{title}</div>{children}</>);
}

function TweakRadio({ value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = React.useRef(null);

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  return (
    <div ref={trackRef} role="radiogroup" onPointerDown={(e) => { const v = segAt(e.clientX); if (v !== value) onChange(v); }} className="twk-seg">
      <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
      {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
    </div>
  );
}

function TweakButton({ children, onClick }) {
  return (<button type="button" className="twk-btn secondary" onClick={onClick}>{children}</button>);
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakButton });
</script>

  switch (name) {

    case "trash":         return <svg {...common}><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/></svg>;
    case "undo":          return <svg {...common}><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>;
    case "redo":          return <svg {...common}><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h3"/></svg>;
    case "download":      return <svg {...common}><path d="M12 4v12m0 0 4-4m-4 4-4-4M5 20h14"/></svg>;
    case "copy":          return <svg {...common}><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>;
    case "check":         return <svg {...common}><path d="m5 12 5 5L20 6"/></svg>;
    case "x":             return <svg {...common}><path d="M6 6l12 12M18 6 6 18"/></svg>;
    case "arrow-right":   return <svg {...common}><path d="M5 12h14m-5-5 5 5-5 5"/></svg>;
    default: return null;
  }
};
window.Icon = Icon;

window.fmtDate = (iso) => {
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
};
window.fmtHHMM = (mins) => {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
};
window.addMinutes = (hhmm, mins) => {
  const parts = (hhmm || '09:00').split(':');
  const base = parseInt(parts[0], 10) * 60 + parseInt(parts[1] || '0', 10);
  const total = base + (mins || 0);
  const h = Math.floor(total / 60) % 24;
  const m = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
};
window.fmtDuration = (mins) => {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
};
window.workshopTotal = (data, workshopId) => {
  const w = data.workshops[workshopId];
  if (!w) return 0;
  let t = 0;
  w.sectionIds.forEach(sid => { data.sections[sid].blockIds.forEach(bid => { t += data.blocks[bid].duration; }); });
  return t;
};
window.projectTotal = (data, projectId) => {
  const proj = Array.isArray(data.projects) ? data.projects.find(x => x.id === projectId) : data.projects[projectId];
  if (!proj) return 0;
  return proj.workshopIds.reduce((s, w) => s + window.workshopTotal(data, w), 0);
};
window.snap5 = (n) => Math.max(5, Math.round((n || 5) / 5) * 5);
</script>

<script type="text/babel">
const BlockEditor = ({ block, onChange, onClose, onDelete, mode = "inline" }) => {
  if (!block) return null;

  const [desc, setDesc] = React.useState(block.description || "");
  const [person, setPerson] = React.useState(block.person || "");
  const [material, setMaterial] = React.useState(block.material || "");
  const [durRaw, setDurRaw] = React.useState(String(block.duration));
  const [durEmpty, setDurEmpty] = React.useState(false);

  React.useEffect(() => {
    setDesc(block.description || "");
    setPerson(block.person || "");
    setMaterial(block.material || "");
    setDurRaw(String(block.duration));
    setDurEmpty(false);
  }, [block.id]);

  const update = (patch) => onChange({ ...block, ...patch });

  const body = (
    <div className="be-grid">
      <div className="be-field be-field-duration">
        <label className="field-label">Duration in min</label>
        <div className="be-duration-stepper">
          <button className="be-step" onClick={() => { const next = Math.max(5, block.duration - 5); setDurRaw(String(next)); setDurEmpty(false); update({ duration: next }); }} aria-label="Decrease 5 min">−</button>
          <input type="number" min="5" step="5" className={"input mono be-duration-input" + (durEmpty ? " is-warn" : "")}
            value={durRaw}
            onChange={(e) => { const v = e.target.value; setDurRaw(v); setDurEmpty(false); if (v !== "") update({ duration: window.snap5(parseInt(v, 10)) }); }}
            onBlur={(e) => { if (e.target.value === "") { setDurEmpty(true); } else { const snapped = window.snap5(parseInt(e.target.value, 10)); setDurRaw(String(snapped)); setDurEmpty(false); update({ duration: snapped }); } }} />
          <button className="be-step" onClick={() => { const next = block.duration + 5; setDurRaw(String(next)); setDurEmpty(false); update({ duration: next }); }} aria-label="Increase 5 min">+</button>
        </div>
      </div>

      <div className="be-field be-field-desc">
        <label className="field-label">Description</label>
        <textarea className="textarea" value={desc}
          onChange={(e) => setDesc(e.target.value)}
          onBlur={() => onChange({ ...block, description: desc, person, material })}
          placeholder="What's the activity? Instructions for your future self." />
      </div>

      <div className="be-field be-field-person">
        <label className="field-label">Person</label>
        <input className="input" value={person}
          onChange={(e) => setPerson(e.target.value)}
          onBlur={() => onChange({ ...block, description: desc, person, material })}

      </div>

      <div className="be-field be-field-material">
        <label className="field-label">Materials</label>
        <input className="input" value={material}
          onChange={(e) => setMaterial(e.target.value)}
          onBlur={() => onChange({ ...block, description: desc, person, material })}
          placeholder="Post-its, projector, etc." />
      </div>

      <div className="be-actions">
        <button className="btn btn-ghost" onClick={onDelete} style={{ color: "var(--danger)" }}>
          <Icon name="trash" size={14} /> Delete block

        <div style={{ flex: 1 }} />
        <button className="btn btn-primary" onClick={() => { onChange({ ...block, description: desc, person, material }); onClose(); }}>
          <Icon name="check" size={14} /> Done
        </button>
      </div>
    </div>
  );

  if (mode === "panel") {
    return (
      <>
        <div className="be-panel-scrim" onClick={() => { onChange({ ...block, description: desc, person, material }); onClose(); }} />
        <aside className="be-panel" role="dialog" aria-label="Edit block">
          <div className="be-panel-head">
            <div>
              <div className="eyebrow">Edit block</div>
              <div className="be-panel-title ce" contentEditable suppressContentEditableWarning
                onBlur={(e) => { const v = e.currentTarget.textContent.trim(); if (v) update({ title: v }); }}
                onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
                style={{ outline: "none", borderRadius: 4, padding: "2px 4px", marginLeft: -4, cursor: "text" }}
                onMouseEnter={(e) => e.currentTarget.style.background = "var(--surface-2)"}
                onMouseLeave={(e) => { if (document.activeElement !== e.currentTarget) e.currentTarget.style.background = ""; }}
                onFocus={(e) => { e.currentTarget.style.background = "var(--surface-2)"; e.currentTarget.style.boxShadow = "0 0 0 2px var(--accent-border)"; }}
                onBlurCapture={(e) => { e.currentTarget.style.background = ""; e.currentTarget.style.boxShadow = ""; }}
              >{block.title || "Untitled block"}</div>
            </div>
            <button className="btn btn-icon" onClick={() => { onChange({ ...block, description: desc, person, material }); onClose(); }}><Icon name="x" size={16} /></button>
          </div>
          <div className="be-panel-body">{body}</div>
        </aside>
      </>
    );
  }

  return (
    <div className="be-inline">{body}</div>
  );
};
window.BlockEditor = BlockEditor;
</script>

<!-- Block row -->
<script type="text/babel">
const BlockRow = ({
  block, isEditing, isDragging, isDropTarget,
  onHover, onOpen, onChange, onClose, onDelete,
  onDragStart, onDragEnd, onDragOver, onDrop,
  startTime,
}) => {
  const [durOpen, setDurOpen] = React.useState(false);
  const popoverRef = React.useRef(null);

  React.useEffect(() => {
    if (!durOpen) return;
    const onDoc = (e) => { if (popoverRef.current && !popoverRef.current.contains(e.target)) setDurOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setDurOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [durOpen]);

  const adjust = (delta) => {
    const next = Math.max(5, (block.duration || 5) + delta);
    onChange({ duration: next });
  };

  return (
    <div
      className={"blk" + (isEditing ? " is-editing" : "") + (isDragging ? " is-dragging" : "") + (isDropTarget ? " is-drop-target" : "")}
      onMouseEnter={() => onHover(true)}
      onMouseLeave={() => onHover(false)}
      onDragOver={onDragOver}
      onDrop={onDrop}
    >
      <div className="blk-row" onClick={() => { if (!isEditing && !durOpen) onOpen(); }}>
        <div
          className="blk-grip"
          draggable
          onDragStart={(e) => { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", block.id); onDragStart && onDragStart(e); }}
          onDragEnd={onDragEnd}
          onClick={(e) => e.stopPropagation()}
          title="Drag to reorder"
        >
          <Icon name="grip" size={14}/>
        </div>

        <div className="blk-main">
          <div className="blk-title-head">
            <div
              className={"blk-duration mono" + (durOpen ? " is-open" : "")}
              onClick={(e) => { e.stopPropagation(); setDurOpen(o => !o); }}
              title="Click to adjust"
            >
              {block.duration}<span className="blk-duration-unit">m</span>
              {startTime && <div className="blk-start-time">{startTime}</div>}
              {durOpen && (
                <div className="blk-dur-pop" ref={popoverRef} onClick={(e) => e.stopPropagation()}>
                  <button className="blk-dur-step" onClick={() => adjust(-5)}>−</button>
                  <input
                    type="number" min="5" step="5" className="blk-dur-input mono"
                    value={block.duration}
                    onChange={(e) => { const v = parseInt(e.target.value || "5", 10); onChange({ duration: Math.max(5, v) }); }}
                    onBlur={(e) => { const v = parseInt(e.target.value || "5", 10); onChange({ duration: window.snap5(v) }); }}
                    onClick={(e) => e.stopPropagation()}
                    autoFocus
                  />
                  <span className="blk-dur-pop-unit mono">min</span>
                  <button className="blk-dur-step" onClick={() => adjust(5)}>+</button>
                </div>
              )}
            </div>
            <div className="blk-content-col">
              <div className="blk-title-row">
                <div className="blk-title">{block.title || "Untitled block"}</div>
                {block.person && (
                  <span className="blk-owner">
                    <Icon name="user" size={11}/> {block.person}
                  </span>
                )}
              </div>
              {block.description && <div className="blk-desc">{block.description}</div>}
              {block.material && <div className="blk-material"><Icon name="package" size={11}/> {block.material}</div>}
            </div>
          </div>
        </div>

        <div className="blk-actions">
          <button className="btn btn-icon blk-delete" onClick={(e) => { e.stopPropagation(); onDelete(); }} title="Delete block">
            <Icon name="trash" size={14}/>
          </button>
        </div>
      </div>

      {isEditing && (
        <BlockEditor mode="inline" block={block} onChange={onChange} onClose={onClose} onDelete={onDelete} />
      )}
    </div>
  );
};
window.BlockRow = BlockRow;
</script>
