<!-- Workshop planner -->
<script type="text/babel">
const ContentEditable = ({ value, onChange, className }) => {
  const ref = React.useRef(null);
  const lastValRef = React.useRef(value);
  React.useEffect(() => {
    if (ref.current && ref.current.textContent !== value) {
      ref.current.textContent = value; lastValRef.current = value;
    }
  }, [value]);
  return (
    <span
      ref={ref}
      className={"ce " + (className || "")}
      contentEditable
      suppressContentEditableWarning
      onBlur={(e) => {
        const v = e.currentTarget.textContent.trim();
        if (v !== lastValRef.current) { lastValRef.current = v; onChange(v); }
      }}
      onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
    />
  );
};

const TickerNumber = ({ value, isOver }) => {
  const [display, setDisplay] = React.useState(value);
  const [bump, setBump] = React.useState(false);
  React.useEffect(() => {
    if (display !== value) {
      setBump(true);
      const t1 = setTimeout(() => setDisplay(value), 0);
      const t2 = setTimeout(() => setBump(false), 320);
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }
  }, [value]);
  return <span className={"ticker" + (bump ? " is-bump" : "") + (isOver ? " is-over" : "")}>{value}</span>;
};

const HistoryContext = React.createContext({ canUndo: false, canRedo: false, undo: () => {}, redo: () => {} });

const UndoRedoBtns = () => {
  const h = React.useContext(HistoryContext);
  return (
    <>
      <button className="btn btn-ghost ws-tool" onClick={h.undo} disabled={!h.canUndo} title="Undo (⌘Z)">
        <Icon name="undo" size={14}/><span>Undo</span><span className="kbd">⌘Z</span>
      </button>
      <button className="btn btn-ghost ws-tool" onClick={h.redo} disabled={!h.canRedo} title="Redo (⌘⇧Z)">
        <Icon name="redo" size={14}/><span>Redo</span>
      </button>
    </>
  );
};

const Workshop = ({ data, workshopId, onUpdateData, onBack, onProject, tweaks, toast, pushHistory }) => {
  const workshop = data.workshops[workshopId];
  const project = data.projects.find((p) => p.id === workshop.projectId);
  const [editingBlockId, setEditingBlockId] = React.useState(null);
  const [collapsed, setCollapsed] = React.useState({});
  const [editingPlanned, setEditingPlanned] = React.useState(false);

  const [drag, setDrag] = React.useState(null);
  const blockDragRef = React.useRef(null); // mirrors drag synchronously for onDragOver
  const [dropOver, setDropOver] = React.useState(null);
  const [secDrag, setSecDrag] = React.useState(null);
  const [secDropAt, setSecDropAt] = React.useState(null);

  const totalMins = window.workshopTotal(data, workshopId);
  const blockOffsets = (() => {
    const map = {}; let cum = 0;
    workshop.sectionIds.forEach(sid => {
      (data.sections[sid]?.blockIds || []).forEach(bid => {
        map[bid] = cum;
        cum += data.blocks[bid]?.duration || 0;
      });
    });
    return map;
  })();
  const editingBlock = editingBlockId ? data.blocks[editingBlockId] : null;
  const editingMode = tweaks.editor;
  const sectionStyle = tweaks.sectionStyle;

  const patchBlock = async (id, patch) => {
    pushHistory();
    onUpdateData((d) => ({ ...d, blocks: { ...d.blocks, [id]: { ...d.blocks[id], ...patch } } }));
    const dbPatch = {};
    if ('title'       in patch) dbPatch.title       = patch.title;
    if ('description' in patch) dbPatch.description = patch.description || null;
    if ('person'      in patch) dbPatch.person      = patch.person      || null;
    if ('material'    in patch) dbPatch.material    = patch.material    || null;
    if ('duration'    in patch) dbPatch.duration    = patch.duration;
    if (Object.keys(dbPatch).length) {
      const { error } = await window.db.from('blocks').update(dbPatch).eq('id', id);
      if (error) toast("Save failed");
    }
  };
  const deleteBlock = async (id) => {
    pushHistory();
    onUpdateData((d) => {
      const newBlocks = { ...d.blocks }; delete newBlocks[id];
      const newSections = { ...d.sections };
      Object.keys(newSections).forEach((sid) => {
        if (newSections[sid].blockIds.includes(id))
          newSections[sid] = { ...newSections[sid], blockIds: newSections[sid].blockIds.filter((x) => x !== id) };
      });
      return { ...d, blocks: newBlocks, sections: newSections };
    });
    setEditingBlockId(null);
    toast("Block deleted");
    await window.db.from('blocks').delete().eq('id', id);
  };
  const addBlock = async (sectionId) => {
    pushHistory();
    const id    = crypto.randomUUID();
    const block = { id, duration: 15, title: "New block", description: "", person: "", material: "" };
    const pos   = data.sections[sectionId]?.blockIds?.length || 0;
    onUpdateData((d) => ({
      ...d,
      blocks:   { ...d.blocks,   [id]: block },
      sections: { ...d.sections, [sectionId]: { ...d.sections[sectionId], blockIds: [...d.sections[sectionId].blockIds, id] } }
    }));
    setEditingBlockId(id);
    await window.db.from('blocks').insert({ id, section_id: sectionId, title: block.title, duration: block.duration, position: pos });
  };
  const addSection = async (insertAtIndex = null) => {
    pushHistory();
    const id  = crypto.randomUUID();
    const sec = { id, title: "New section", blockIds: [] };
    let newIds;
    onUpdateData((d) => {
      const ws = d.workshops[workshopId];
      newIds = [...ws.sectionIds];
      if (insertAtIndex == null || insertAtIndex >= newIds.length) newIds.push(id);
      else newIds.splice(insertAtIndex, 0, id);
      return { ...d, sections: { ...d.sections, [id]: sec }, workshops: { ...d.workshops, [workshopId]: { ...ws, sectionIds: newIds } } };
    });
    const pos = insertAtIndex == null ? (data.workshops[workshopId]?.sectionIds.length || 0) : insertAtIndex;
    await window.db.from('sections').insert({ id, workshop_id: workshopId, title: sec.title, position: pos });
    // Re-sync positions for sections after insert point
    setTimeout(() => {
      if (newIds) window.syncSectionPositions(newIds).catch(() => {});
    }, 0);
  };
  const renameSection = async (id, title) => {
    pushHistory();
    onUpdateData((d) => ({ ...d, sections: { ...d.sections, [id]: { ...d.sections[id], title } } }));
    await window.db.from('sections').update({ title }).eq('id', id);
  };
  const renameWorkshop = async (title) => {
    pushHistory();
    onUpdateData((d) => ({ ...d, workshops: { ...d.workshops, [workshopId]: { ...d.workshops[workshopId], title } } }));
    await window.db.from('workshops').update({ title }).eq('id', workshopId);
  };
  const changePlannedDuration = async (mins) => {
    pushHistory();
    const snapped = Math.max(5, window.snap5(mins));
    onUpdateData((d) => ({ ...d, workshops: { ...d.workshops, [workshopId]: { ...d.workshops[workshopId], plannedDuration: snapped } } }));
    await window.db.from('workshops').update({ planned_duration: snapped }).eq('id', workshopId);
  };
  const changeDate = async (date) => {
    pushHistory();
    onUpdateData((d) => ({ ...d, workshops: { ...d.workshops, [workshopId]: { ...d.workshops[workshopId], date } } }));
    await window.db.from('workshops').update({ date: date || null }).eq('id', workshopId);
  };
  const changeStartTime = async (startTime) => {
    onUpdateData((d) => ({ ...d, workshops: { ...d.workshops, [workshopId]: { ...d.workshops[workshopId], startTime } } }));
    await window.db.from('workshops').update({ start_time: startTime }).eq('id', workshopId);
  };
  const deleteSection = async (id) => {
    pushHistory();
    onUpdateData((d) => {
      const sec = d.sections[id];
      const newBlocks = { ...d.blocks }; sec.blockIds.forEach((bid) => delete newBlocks[bid]);
      const newSections = { ...d.sections }; delete newSections[id];
      return {
        ...d, blocks: newBlocks, sections: newSections,
        workshops: { ...d.workshops, [workshopId]: { ...d.workshops[workshopId], sectionIds: d.workshops[workshopId].sectionIds.filter((x) => x !== id) } }
      };
    });
    toast("Section removed");
    await window.db.from('sections').delete().eq('id', id);
  };

  const findBlockSection = (data, blockId) => {
    for (const sid of Object.keys(data.sections)) {
      if (data.sections[sid].blockIds.includes(blockId)) return sid;
    }
    return null;
  };

  const moveSection = async (sectionId, insertAt) => {
    pushHistory();
    let newIds;
    onUpdateData((d) => {
      const ws = d.workshops[workshopId];
      newIds = ws.sectionIds.filter((x) => x !== sectionId);
      const adjusted = insertAt > ws.sectionIds.indexOf(sectionId) ? insertAt - 1 : insertAt;
      newIds.splice(Math.max(0, Math.min(newIds.length, adjusted)), 0, sectionId);
      return { ...d, workshops: { ...d.workshops, [workshopId]: { ...ws, sectionIds: newIds } } };
    });
    setTimeout(() => { if (newIds) window.syncSectionPositions(newIds).catch(() => {}); }, 0);
  };

  const moveBlock = async (blockId, toSectionId, beforeBlockId) => {
    pushHistory();
    let affectedSections = {};
    onUpdateData((d) => {
      const fromSid = findBlockSection(d, blockId);
      if (!fromSid) return d;
      const sections = { ...d.sections };
      sections[fromSid] = { ...sections[fromSid], blockIds: sections[fromSid].blockIds.filter((x) => x !== blockId) };
      const toIds = (fromSid === toSectionId ? sections[fromSid].blockIds : sections[toSectionId].blockIds).slice();
      const idx = beforeBlockId == null ? toIds.length : toIds.indexOf(beforeBlockId);
      toIds.splice(idx === -1 ? toIds.length : idx, 0, blockId);
      sections[toSectionId] = { ...sections[toSectionId], blockIds: toIds };
      affectedSections = { [fromSid]: sections[fromSid].blockIds, [toSectionId]: toIds };
      return { ...d, sections };
    });
    setTimeout(() => {
      Object.entries(affectedSections).forEach(([sid, ids]) => window.syncBlockPositions(sid, ids).catch(() => {}));
    }, 0);
  };

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") setEditingBlockId(null); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <div className="ws-page">
      <header className="ws-header">
        <div className="ws-header-inner">
          <div className="ws-header-meta">
            <div className="eyebrow" style={{ marginBottom: 10, display: "flex", gap: 8, alignItems: "center", whiteSpace: "nowrap" }}>
              <a onClick={onBack} style={{ cursor: "pointer", color: "var(--text-muted)" }}>Projects</a>
              <span style={{ color: "var(--text-subtle)" }}>/</span>
              <a onClick={onProject} style={{ cursor: "pointer", color: "var(--text-muted)" }}>{project.name}</a>
            </div>
            <ContentEditable className="ws-title" value={workshop.title} onChange={renameWorkshop} />
            <div className="ws-header-row">
              <label className="ws-date">
                <Icon name="calendar" size={13}/>
                <input type="date" value={workshop.date} onChange={(e) => changeDate(e.target.value)} className="ws-date-input"/>
              </label>
              <span style={{ color: "var(--text-subtle)" }}>·</span>
              <label className="ws-start-time">
                <Icon name="clock" size={13}/>
                <input
                  type="time" value={workshop.startTime || '09:00'}
                  onChange={(e) => changeStartTime(e.target.value)}
                  className="ws-start-time-input"
                />
              </label>
              {totalMins > 0 && (
                <>
                  <span style={{ color: "var(--text-subtle)" }}>·</span>
                  <span className="ws-end-time">Ends {window.addMinutes(workshop.startTime || '09:00', totalMins)}</span>
                </>
              )}
            </div>
          </div>

          <div className="ws-header-total">
            <div className="eyebrow">Total session</div>
            <div className="ws-total-num serif">
              <TickerNumber value={window.fmtDuration(totalMins)} isOver={totalMins > (workshop.plannedDuration || 0)} />
            </div>
            {editingPlanned ? (
              <div className="ws-total-sub mono" style={{ display: "flex", alignItems: "center", gap: 4, justifyContent: "flex-end" }}>
                <input
                  type="number" min="5" step="5"
                  defaultValue={workshop.plannedDuration || totalMins}
                  onBlur={(e) => { changePlannedDuration(parseInt(e.target.value || "5", 10)); setEditingPlanned(false); }}
                  onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.blur(); if (e.key === "Escape") setEditingPlanned(false); }}
                  autoFocus
                  style={{ width: 52, textAlign: "right", border: "1px solid var(--border)", borderRadius: 4, padding: "1px 4px", fontFamily: "var(--font-mono)", fontSize: 12, background: "var(--surface)", outline: "none" }}
                />
                <span>min planned</span>
              </div>
            ) : (
              <div className="ws-total-sub mono" onClick={() => setEditingPlanned(true)} style={{ cursor: "pointer" }} title="Click to edit planned duration">
                {window.fmtDuration(workshop.plannedDuration || totalMins)} planned
              </div>
            )}
          </div>
        </div>

        <div className="ws-toolbar">
          <div className="ws-toolbar-group">
            <UndoRedoBtns/>
          </div>
          <div style={{ flex: 1 }}/>
        </div>
      </header>

      <main className={"ws-agenda style-" + sectionStyle} onDragOver={(e) => { if (blockDragRef.current) e.preventDefault(); }}>
        {workshop.sectionIds.map((sid, idx) => {
          const section = data.sections[sid];
          const isCollapsed = !!collapsed[sid];
          const secTotal = section.blockIds.reduce((s, bid) => s + data.blocks[bid].duration, 0);

          const InsertBar = (
            <div className="sec-insert" onClick={() => addSection(idx)}>
              <span className="sec-insert-line"/>
              <span className="sec-insert-btn"><Icon name="plus" size={12}/> Add section here</span>
              <span className="sec-insert-line"/>
            </div>
          );

          const SecDropBar = (
            <div
              className={"sec-drop-bar" + (secDrag && secDropAt === idx ? " is-active" : "")}
              onDragOver={(e) => { if (secDrag) { e.preventDefault(); setSecDropAt(idx); } }}
              onDrop={(e) => { if (secDrag) { e.preventDefault(); moveSection(secDrag, idx); setSecDrag(null); setSecDropAt(null); } }}
            />
          );

          return (
            <React.Fragment key={sid}>
              {idx > 0 && !secDrag && !drag && InsertBar}
              {secDrag && SecDropBar}

              <section
                className={"sec " + (sectionStyle === "cards" ? "sec-card" : "sec-flat") + (secDrag === sid ? " is-section-dragging" : "")}
                onDragOver={(e) => { if ((secDrag && secDrag !== sid) || blockDragRef.current) e.preventDefault(); }}
              >
                <span
                  className="sec-grip"
                  draggable
                  onDragStart={(e) => { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", "sec:" + sid); setSecDrag(sid); }}
                  onDragEnd={() => { setSecDrag(null); setSecDropAt(null); }}
                  title="Drag section to reorder"
                >
                  <Icon name="grip" size={12}/>
                </span>
                <header className="sec-head">
                  <button className="sec-toggle" onClick={() => setCollapsed((c) => ({ ...c, [sid]: !c[sid] }))}>
                    <Icon name={isCollapsed ? "chevron-right" : "chevron-down"} size={14}/>
                  </button>
                  <div className="sec-index mono">{String(idx + 1).padStart(2, "0")}</div>
                  <ContentEditable className="sec-title" value={section.title} onChange={(v) => renameSection(sid, v)} />
                  <div className="sec-duration mono" title="Section duration">
                    <span className="sec-duration-num">{secTotal}</span>
                    <span className="sec-duration-unit">min</span>
                  </div>
                  <div className="sec-actions">
                    <button className="btn btn-icon" onClick={() => deleteSection(sid)} title="Delete section"><Icon name="trash" size={15}/></button>
                  </div>
                </header>

                {!isCollapsed && (
                  <div
                    className="sec-body"
                    onDragOver={(e) => {
                      if (!blockDragRef.current) return;
                      e.preventDefault();
                      if (section.blockIds.length === 0) { setDropOver({ sectionId: sid, beforeBlockId: null }); }
                    }}
                    onDrop={(e) => {
                      const d = blockDragRef.current;
                      if (!d) return;
                      if (section.blockIds.length === 0) { e.preventDefault(); moveBlock(d.blockId, sid, null); blockDragRef.current = null; setDrag(null); setDropOver(null); }
                    }}
                  >
                    {section.blockIds.length === 0 && (
                      <button className={"sec-empty" + (drag && dropOver?.sectionId === sid ? " is-drop-target" : "")} onClick={() => addBlock(sid)}>
                        <Icon name="plus" size={14}/>
                        {drag ? "Drop block here" : "Empty section. Add the first block."}
                      </button>
                    )}

                    {section.blockIds.map((bid) => {
                      const block = data.blocks[bid];
                      const isEditing = editingBlockId === bid && editingMode === "inline";
                      const isDropTarget = dropOver && dropOver.sectionId === sid && dropOver.beforeBlockId === bid;
                      return (
                        <BlockRow
                          key={bid}
                          block={block}
                          isEditing={isEditing}
                          isDragging={drag?.blockId === bid}
                          isDropTarget={isDropTarget}
                          onHover={(h) => {}}
                          onOpen={() => setEditingBlockId(bid)}
                          onChange={(patch) => patchBlock(bid, patch)}
                          onClose={() => setEditingBlockId(null)}
                          onDelete={() => deleteBlock(bid)}
                          startTime={window.addMinutes(workshop.startTime || '09:00', blockOffsets[bid] || 0)}
                          onDragStart={() => { const d = { blockId: bid, fromSection: sid }; blockDragRef.current = d; setDrag(d); }}
                          onDragEnd={() => { blockDragRef.current = null; setDrag(null); setDropOver(null); }}
                          onDragOver={(e) => {
                            if (!blockDragRef.current) return;
                            e.preventDefault();
                            e.dataTransfer.dropEffect = "move";
                            const rect = e.currentTarget.getBoundingClientRect();
                            const before = (e.clientY - rect.top) < rect.height / 2;
                            const blockIds = data.sections[sid].blockIds;
                            const ix = blockIds.indexOf(bid);
                            const beforeBlockId = before ? bid : (blockIds[ix + 1] || null);
                            setDropOver({ sectionId: sid, beforeBlockId });
                          }}
                          onDrop={(e) => {
                            const d = blockDragRef.current;
                            if (!d) return;
                            e.preventDefault();
                            if (dropOver) moveBlock(d.blockId, dropOver.sectionId, dropOver.beforeBlockId);
                            blockDragRef.current = null; setDrag(null); setDropOver(null);
                          }}
                        />
                      );
                    })}

                    {drag && section.blockIds.length > 0 && (
                      <div
                        className={"blk-drop-tail" + (dropOver?.sectionId === sid && dropOver?.beforeBlockId === null ? " is-active" : "")}
                        onDragOver={(e) => { e.preventDefault(); setDropOver({ sectionId: sid, beforeBlockId: null }); }}
                        onDrop={(e) => { const d = blockDragRef.current; if (!d) return; e.preventDefault(); moveBlock(d.blockId, sid, null); blockDragRef.current = null; setDrag(null); setDropOver(null); }}
                      />
                    )}

                    <button className="sec-add-row" onClick={() => addBlock(sid)}>
                      <Icon name="plus" size={13}/> Add block to "{section.title}"
                    </button>
                  </div>
                )}
              </section>

              {secDrag && idx === workshop.sectionIds.length - 1 && (
                <div
                  className={"sec-drop-bar" + (secDropAt === workshop.sectionIds.length ? " is-active" : "")}
                  onDragOver={(e) => { e.preventDefault(); setSecDropAt(workshop.sectionIds.length); }}
                  onDrop={(e) => { e.preventDefault(); moveSection(secDrag, workshop.sectionIds.length); setSecDrag(null); setSecDropAt(null); }}
                />
              )}
            </React.Fragment>
          );
        })}

        <button className="ws-add-section" onClick={() => addSection()}>
          <Icon name="plus" size={16}/><span>Add a section</span>
        </button>
      </main>

      {editingBlock && editingMode === "panel" && (
        <BlockEditor
          mode="panel"
          block={editingBlock}
          onChange={(b) => patchBlock(editingBlockId, b)}
          onClose={() => setEditingBlockId(null)}
          onDelete={() => deleteBlock(editingBlockId)}
        />
      )}
    </div>
  );
};

window.Workshop = Workshop;
window.HistoryContext = HistoryContext;
</script>

<!-- Auth + Profile screens -->
<script type="text/babel">
const AuthScreen = () => {
  const [mode, setMode] = React.useState("signin"); // "signin" | "signup" | "reset"
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const [alert, setAlert] = React.useState(null); // { type: "error"|"success", msg }

  const go = (m) => { setMode(m); setAlert(null); };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setBusy(true);
    setAlert(null);

    if (mode === "reset") {
      const { error } = await window.db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });
      setAlert(error
        ? { type: "error",   msg: error.message }
        : { type: "success", msg: "Check your email for a password-reset link." });
      setBusy(false);
      return;
    }

    if (mode === "signup") {
      const { data, error } = await window.db.auth.signUp({ email, password });
      if (error) {
        const msg = error.message.toLowerCase().includes("already registered")
          ? "An account with this email already exists. Try signing in."
          : error.message;
        setAlert({ type: "error", msg });
      } else if (data.session === null) {
        // email confirmation is enabled on this Supabase project
        setAlert({ type: "success", msg: "Account created! Check your email to confirm before signing in." });
      }
      // if session exists, onAuthStateChange fires automatically
    } else {
      const { error } = await window.db.auth.signInWithPassword({ email, password });
      if (error) {
        const msg = error.message.toLowerCase().includes("invalid login")
          ? "Incorrect email or password."
          : error.message.toLowerCase().includes("email not confirmed")
          ? "Please confirm your email before signing in."
          : error.message;
        setAlert({ type: "error", msg });
      }
      // on success, onAuthStateChange fires automatically
    }
    setBusy(false);
  };

  const titles = { signin: "Sign in.", signup: "Create account.", reset: "Reset password." };

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-brand">workshop<span className="dot">.</span>flow</div>
        <h1 className="auth-title">{titles[mode]}</h1>

        <form onSubmit={handleSubmit}>
          <div className="auth-field">
            <label>Email</label>
            <input className="input" type="email" value={email}
              onChange={(e) => setEmail(e.target.value)} required autoFocus autoComplete="email" />
          </div>

          {mode !== "reset" && (
            <div className="auth-field">
              <label>Password</label>
              <input className="input" type="password" value={password}
                onChange={(e) => setPassword(e.target.value)} required minLength={6}
                autoComplete={mode === "signup" ? "new-password" : "current-password"} />
            </div>
          )}

          {alert && <div className={`auth-alert ${alert.type}`}>{alert.msg}</div>}

          <button type="submit" className="btn auth-submit" disabled={busy}>
            {busy ? "…" : mode === "reset" ? "Send reset link" : mode === "signup" ? "Create account" : "Sign in"}
          </button>
        </form>

        <div className="auth-footer">
          {mode === "signin" && <>
            <button type="button" onClick={() => go("signup")}>New here? Create an account</button>
            <button type="button" onClick={() => go("reset")}>Forgot password?</button>
          </>}
          {mode === "signup" && (
            <button type="button" onClick={() => go("signin")}>Already have an account? Sign in</button>
          )}
          {mode === "reset" && (
            <button type="button" onClick={() => go("signin")}>← Back to sign in</button>
          )}
        </div>
      </div>
    </div>
  );
};

const ProfileView = ({ session, onBack }) => {
  const userEmail = session?.user?.email || "";
  const [email,    setEmail]    = React.useState(userEmail);
  const [password, setPassword] = React.useState("");
  const [emailBusy,    setEmailBusy]    = React.useState(false);
  const [passwordBusy, setPasswordBusy] = React.useState(false);
  const [emailFb,    setEmailFb]    = React.useState(null);
  const [passwordFb, setPasswordFb] = React.useState(null);

  const saveEmail = async (e) => {
    e.preventDefault();
    setEmailBusy(true); setEmailFb(null);
    const { error } = await window.db.auth.updateUser({ email });
    setEmailFb(error
      ? { type: "error",   msg: error.message }
      : { type: "success", msg: "Confirmation sent to your new email address." });
    setEmailBusy(false);
  };

  const savePassword = async (e) => {
    e.preventDefault();
    setPasswordBusy(true); setPasswordFb(null);
    const { error } = await window.db.auth.updateUser({ password });
    if (!error) setPassword("");
    setPasswordFb(error
      ? { type: "error",   msg: error.message }
      : { type: "success", msg: "Password updated." });
    setPasswordBusy(false);
  };

  const signOut = async () => {
    await window.db.auth.signOut();
  };

  return (
    <div className="page" data-screen-label="Profile">
      <div className="page-head">
        <div>
          <div className="eyebrow" style={{ marginBottom: 14 }}>
            <a onClick={onBack} style={{ cursor: "pointer", color: "var(--text-muted)" }}>Projects</a>
            <span style={{ color: "var(--text-subtle)", margin: "0 6px" }}>/</span>
            <span>Account</span>
          </div>
          <h1 className="page-title">Account</h1>
        </div>
      </div>

      <div className="profile-body">
        <div className="profile-section">
          <div className="profile-section-title">Email address</div>
          <form onSubmit={saveEmail}>
            <div className="profile-row" style={{ marginBottom: emailFb ? 10 : 0 }}>
              <input className="input" type="email" value={email}
                onChange={(e) => setEmail(e.target.value)} autoComplete="email" />
              <button className="btn btn-primary" type="submit"
                disabled={emailBusy || email === userEmail}>
                {emailBusy ? "Saving…" : "Update"}
              </button>
            </div>
            {emailFb && <div className={`profile-feedback ${emailFb.type}`}>{emailFb.msg}</div>}
          </form>
        </div>

        <div className="profile-section">
          <div className="profile-section-title">New password</div>
          <form onSubmit={savePassword}>
            <div className="profile-row" style={{ marginBottom: passwordFb ? 10 : 0 }}>
              <input className="input" type="password" value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="Enter new password" minLength={6} autoComplete="new-password" />
              <button className="btn btn-primary" type="submit"
                disabled={passwordBusy || !password}>
                {passwordBusy ? "Saving…" : "Update"}
              </button>
            </div>
            {passwordFb && <div className={`profile-feedback ${passwordFb.type}`}>{passwordFb.msg}</div>}
          </form>
        </div>

        <div className="profile-section">
          <div className="profile-section-title">Session</div>
          <div>
            <div style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 12 }}>
              Signed in as <strong style={{ color: "var(--text)" }}>{userEmail}</strong>
            </div>
            <button className="btn btn-ghost" onClick={signOut} style={{ color: "var(--danger)" }}>
              <Icon name="trash" size={14} /> Sign out
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

window.AuthScreen   = AuthScreen;
window.ProfileView  = ProfileView;
</script>

<!-- App -->
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const App = () => {
  const [session,      setSession]      = useState(null);
  const [authChecked,  setAuthChecked]  = useState(false);
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(false);
  const [dbError, setDbError] = useState(null);
  const [view,    setView]    = useState({ name: "dashboard" });
  const [toastMsg, setToastMsg] = useState(null);
  const [tweaks, setTweak] = window.useTweaks(window.TWEAK_DEFAULTS);

  const undoStack = useRef([]);
  const redoStack = useRef([]);
  const [, forceTick] = useState(0);
  const bump = () => forceTick((t) => t + 1);

  const loadStartedRef = useRef(false);

  const loadData = async (user = null) => {
    if (loadStartedRef.current) return;
    loadStartedRef.current = true;
    setLoading(true); setDbError(null);
    try {
      let d = await window.loadAllData();
      if (user && d.projects.length === 0) {
        const flag = `wf_seeded_${user.id}`;
        if (!localStorage.getItem(flag)) {
          await window.seedSampleProject().catch(() => {});
          localStorage.setItem(flag, '1');
          d = await window.loadAllData();
        }
      }
      setData(d); setLoading(false);
    } catch(e) {
      loadStartedRef.current = false;
      setDbError(e.message || "Could not connect to database."); setLoading(false);
    }
  };

  // ── Auth state listener ──
  useEffect(() => {
    const { data: { subscription } } = window.db.auth.onAuthStateChange((event, s) => {
      setSession(s);
      setAuthChecked(true);
      if ((event === "SIGNED_IN" || event === "INITIAL_SESSION") && s) {
        loadData(s.user);
      }
      if (event === "SIGNED_OUT") {
        loadStartedRef.current = false;
        setData(null);
        setView({ name: "dashboard" });
        undoStack.current = [];
        redoStack.current = [];
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  const showToast = (msg) => {
    setToastMsg(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => setToastMsg(null), 1800);
  };

  const pushHistory = useCallback(() => {
    undoStack.current.push(JSON.parse(JSON.stringify(data)));
    if (undoStack.current.length > 50) undoStack.current.shift();
    redoStack.current = [];
    bump();
  }, [data]);

  const undo = useCallback(() => {
    if (!undoStack.current.length) return;
    const prev = undoStack.current.pop();
    const curr = JSON.parse(JSON.stringify(data));
    redoStack.current.push(curr);
    setData(prev); bump(); showToast("Undone");
    window.applyStateDiff(curr, prev).catch(() => showToast("Sync error after undo"));
  }, [data]);

  const redo = useCallback(() => {
    if (!redoStack.current.length) return;
    const next = redoStack.current.pop();
    const curr = JSON.parse(JSON.stringify(data));
    undoStack.current.push(curr);
    setData(next); bump(); showToast("Redone");
    window.applyStateDiff(curr, next).catch(() => showToast("Sync error after redo"));
  }, [data]);

  useEffect(() => {
    const onKey = (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && e.key.toLowerCase() === "z" && !e.shiftKey) { e.preventDefault(); undo(); }
      else if (mod && (e.key.toLowerCase() === "y" || (e.shiftKey && e.key.toLowerCase() === "z"))) { e.preventDefault(); redo(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [undo, redo]);

  useEffect(() => {
    window.history.replaceState({ name: "dashboard" }, '');
    const onPop = (e) => setView(e.state || { name: "dashboard" });
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  useEffect(() => { document.body.setAttribute("data-density", tweaks.density); }, [tweaks.density]);

  const updateData = (mut) => setData((d) => typeof mut === "function" ? mut(d) : mut);

  const navigateTo = (newView) => { setView(newView); window.history.pushState(newView, ''); };
  const goDashboard = () => navigateTo({ name: "dashboard" });
  const goProject   = (projectId) => navigateTo({ name: "project", projectId });
  const goWorkshop  = (workshopId) => {
    const w = data.workshops[workshopId];
    navigateTo({ name: "workshop", projectId: w.projectId, workshopId });
  };

  // ── App-level mutations (with Supabase writes) ──
  const newProject = async () => {
    const id = crypto.randomUUID();
    const p  = { id, name: "Untitled project", description: "Add a short description.", workshopIds: [] };
    setData((d) => ({ ...d, projects: [p, ...d.projects] }));
    navigateTo({ name: "project", projectId: id });
    const { error } = await window.db.from('projects').insert({ id, name: p.name, description: p.description });
    if (error) { showToast("Failed to create project"); setData((d) => ({ ...d, projects: d.projects.filter(x => x.id !== id) })); }
  };

  const updateProject = async (projectId, patch) => {
    pushHistory();
    setData((d) => ({ ...d, projects: d.projects.map((p) => p.id === projectId ? { ...p, ...patch } : p) }));
    const dbPatch = {};
    if ('name'        in patch) dbPatch.name        = patch.name;
    if ('description' in patch) dbPatch.description = patch.description;
    if (Object.keys(dbPatch).length) await window.db.from('projects').update(dbPatch).eq('id', projectId);
  };

  const deleteProject = async (projectId) => {
    pushHistory();
    setData((d) => {
      const proj = d.projects.find((p) => p.id === projectId);
      const newWorkshops = { ...d.workshops }, newSections = { ...d.sections }, newBlocks = { ...d.blocks };
      proj.workshopIds.forEach((wid) => {
        const w = d.workshops[wid];
        if (w) w.sectionIds.forEach((sid) => {
          const s = d.sections[sid];
          if (s) s.blockIds.forEach((bid) => delete newBlocks[bid]);
          delete newSections[sid];
        });
        delete newWorkshops[wid];
      });
      return { ...d, projects: d.projects.filter((p) => p.id !== projectId), workshops: newWorkshops, sections: newSections, blocks: newBlocks };
    });
    showToast("Project deleted");
    await window.db.from('projects').delete().eq('id', projectId);
  };

  const newWorkshop = async (projectId) => {
    const sid = crypto.randomUUID(), wid = crypto.randomUUID();
    const sec = { id: sid, title: "Opening", blockIds: [] };
    const ws  = { id: wid, projectId, title: "Untitled workshop", date: "2026-06-01", plannedDuration: 0, startTime: '09:00', sectionIds: [sid] };
    const pos = data.projects.find(p => p.id === projectId)?.workshopIds.length || 0;
    setData((d) => ({
      ...d,
      workshops: { ...d.workshops, [wid]: ws },
      sections:  { ...d.sections,  [sid]: sec },
      projects:  d.projects.map((p) => p.id === projectId ? { ...p, workshopIds: [...p.workshopIds, wid] } : p)
    }));
    navigateTo({ name: "workshop", projectId, workshopId: wid });
    const { error } = await window.db.from('workshops').insert({ id: wid, project_id: projectId, title: ws.title, date: ws.date, planned_duration: 0, start_time: '09:00', position: pos });
    if (!error) await window.db.from('sections').insert({ id: sid, workshop_id: wid, title: sec.title, position: 0 });
  };

  const deleteWorkshop = async (workshopId) => {
    pushHistory();
    const w = data.workshops[workshopId];
    setData((d) => {
      const newWorkshops = { ...d.workshops }; delete newWorkshops[workshopId];
      const newSections  = { ...d.sections };
      w.sectionIds.forEach((sid) => { const s = d.sections[sid]; if (s) { delete newSections[sid]; } });
      return { ...d, workshops: newWorkshops, sections: newSections,
        projects: d.projects.map((p) => ({ ...p, workshopIds: p.workshopIds.filter((x) => x !== workshopId) })) };
    });
    showToast("Workshop deleted");
    await window.db.from('workshops').delete().eq('id', workshopId);
  };

  const hist = { canUndo: undoStack.current.length > 0, canRedo: redoStack.current.length > 0, undo, redo };

  // ── Auth / loading / error states ──
  if (!authChecked) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:16, color:"var(--text-muted)" }}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
        style={{ animation:"spin 1s linear infinite" }}>
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if (!session) return <window.AuthScreen />;

  if (loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:16, color:"var(--text-muted)" }}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
        style={{ animation:"spin 1s linear infinite" }}>
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
      <span style={{ fontFamily:"var(--font-mono)", fontSize:12 }}>Loading…</span>
    </div>
  );

  if (dbError) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:12, color:"var(--danger)", padding:32, textAlign:"center" }}>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div style={{ fontWeight:600 }}>Could not load data</div>
      <div style={{ fontSize:13, color:"var(--text-muted)", maxWidth:320 }}>{dbError}</div>
      <button className="btn btn-primary" style={{ marginTop:8 }} onClick={loadData}>
        Retry
      </button>
    </div>
  );

  const firstProjectId  = data.projects[0]?.id;
  const firstWorkshopId = firstProjectId ? data.projects[0]?.workshopIds[0] : null;

  return (
    <window.HistoryContext.Provider value={hist}>
      <div className="app-shell">
        <nav className="topnav">
          <div className="topnav-left">
            <a className="brand" onClick={goDashboard} style={{ cursor: "pointer" }}>
              workshop<span className="dot">.</span>flow
            </a>
          </div>
          <div className="topnav-right">
            <button className="avatar-btn" onClick={() => navigateTo({ name: "profile" })} title="Account">
              {(session?.user?.email?.[0] ?? "?").toUpperCase()}
            </button>
          </div>
        </nav>

        {view.name === "dashboard" &&
          <Dashboard data={data} onOpenProject={goProject} onNewProject={newProject} onDeleteProject={deleteProject} />
        }
        {view.name === "project" &&
          <ProjectView
            data={data}
            projectId={view.projectId}
            onOpenWorkshop={goWorkshop}
            onNewWorkshop={() => newWorkshop(view.projectId)}
            onDeleteWorkshop={deleteWorkshop}
            onUpdateProject={updateProject}
            onBack={goDashboard}
          />
        }
        {view.name === "workshop" &&
          <Workshop
            data={data}
            workshopId={view.workshopId}
            onUpdateData={updateData}
            onBack={goDashboard}
            onProject={() => goProject(view.projectId)}
            tweaks={tweaks}
            toast={showToast}
            pushHistory={pushHistory}
          />
        }
        {view.name === "profile" &&
          <window.ProfileView session={session} onBack={goDashboard} />
        }

        {toastMsg && <div className="toast"><Icon name="check" size={14} />{toastMsg}</div>}

        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Density">
            <window.TweakRadio value={tweaks.density} onChange={(v) => setTweak("density", v)}
              options={[{ value: "compact", label: "Compact" }, { value: "comfortable", label: "Comfort" }, { value: "spacious", label: "Spacious" }]} />
          </window.TweakSection>
          <window.TweakSection title="Section style">
            <window.TweakRadio value={tweaks.sectionStyle} onChange={(v) => setTweak("sectionStyle", v)}
              options={[{ value: "cards", label: "Cards" }, { value: "flat", label: "Flat" }]} />
          </window.TweakSection>
          <window.TweakSection title="Block editor">
            <window.TweakRadio value={tweaks.editor} onChange={(v) => setTweak("editor", v)}
              options={[{ value: "inline", label: "Inline" }, { value: "panel", label: "Panel" }]} />
          </window.TweakSection>
          <window.TweakSection title="Jump to">
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <window.TweakButton onClick={goDashboard}>Dashboard</window.TweakButton>
              {firstProjectId  && <window.TweakButton onClick={() => goProject(firstProjectId)}>Project view</window.TweakButton>}
              {firstWorkshopId && <window.TweakButton onClick={() => goWorkshop(firstWorkshopId)}>Workshop planner</window.TweakButton>}
            </div>
          </window.TweakSection>
        </window.TweaksPanel>
      </div>
    </window.HistoryContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
